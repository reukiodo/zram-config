name: Release

on:
  push:
    tags:
      - "*.*.*"

jobs:
  build_tarball:
    name: Build source archive
    runs-on: "debian-latest"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6.3.0
        with:
          gpg_private_key: "${{ secrets.GPG_PRIVATE_KEY }}"
          passphrase: "${{ secrets.GPG_PASSPHRASE }}"

      - name: Archive zram-config
        run: |
          export tag="${{ github.ref_name }}"
          sudo apt-get install lzip
          git ls-files --recurse-submodules | tar -cf zram-config-${tag}.tar --xform s:^:zram-config-${tag}/: --verbatim-files-from -T-
          lzip --best --keep --verbose --verbose zram-config-${tag}.tar
          gpg --detach-sign --armor zram-config-${tag}.tar.lz
          gpg --verify zram-config-${tag}.tar.lz.asc zram-config-${tag}.tar.lz
          unset tag
        shell: bash

      - name: Create source archive
        run: tar -cvf ${{ vars.PKG_NAME }}-${{ github.ref_name }}.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ vars.PKG_NAME }}-${{ github.ref_name }}.tar.gz
          path: ${{ vars.PKG_NAME }}-${{ github.ref_name }}.tar.gz
          compression-level: 9

  build-debs:
    name: Build debian package
    runs-on: debian-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build deb
        uses: jtdor/build-deb-action@v1
        env:
          DEB_BUILD_OPTIONS: noautodbgsym
        with:
          buildpackage-opts: --build=binary --no-sign
      - name: Upload deb
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ vars.PKG_NAME }}-${{ github.ref_name }}.tar.gz
          path: ${{ vars.PKG_NAME }}-${{ github.ref_name }}.tar.gz
          compression-level: 9

  publish-release:
    name: Create release
    runs-on: debian-latest
    steps:
      - name: Download cached artifacts
        uses: actions/download-artifact@v3

      - uses: "softprops/action-gh-release@v2"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          generate_release_notes: true
          make_latest: true
          files: zram-config-*
